name: TomsClippyLight
options:
  minimumXcodeGenVersion: "2.45.0"
  bundleIdPrefix: com.tomschmidtdev
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    DEVELOPMENT_TEAM: "UVRF68766E"
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "Apple Development"
    CODE_SIGNING_REQUIRED: "YES"
    CODE_SIGNING_ALLOWED: "YES"
    ENABLE_HARDENED_RUNTIME: "NO"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: "NO"
    GENERATE_INFOPLIST_FILE: "NO"

packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.2.0"

targets:
  TomsClippyLight:
    type: application
    platform: macOS
    sources:
      - path: TomsClippyLight
        excludes:
          - "Info.plist"
    resources:
      - path: TomsClippyLight/Resources
      - path: TomsClippyLight/Localization
      - path: TomsClippyLight/Assets.xcassets
    dependencies:
      - package: KeyboardShortcuts
    info:
      path: TomsClippyLight/Info.plist
      properties:
        CFBundleDisplayName: Toms Clippy Light
        CFBundleIconFile: AppIcon
        CFBundleShortVersionString: "0.1.4"
        CFBundleVersion: "20"
        LSUIElement: true
        LSMinimumSystemVersion: "26.0"
        NSHumanReadableCopyright: "Copyright © 2026 Tom Schmidt. Licensed under MIT."
        NSAppleEventsUsageDescription: >-
          Toms Clippy Light needs access to send keystrokes so it can paste
          selected clipboard entries into the previously focused application.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tomschmidtdev.tomsclippylight
        PRODUCT_NAME: TomsClippyLight
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        COMBINE_HIDPI_IMAGES: "YES"
        ENABLE_PREVIEWS: "YES"
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026 Tom Schmidt. Licensed under MIT."

  TomsClippyLightTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: TomsClippyLightTests
    dependencies:
      - target: TomsClippyLight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tomschmidtdev.tomsclippylight.tests
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/TomsClippyLight.app/Contents/MacOS/TomsClippyLight"
        GENERATE_INFOPLIST_FILE: "YES"

  TomsClippyLightUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: TomsClippyLightUITests
    dependencies:
      - target: TomsClippyLight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tomschmidtdev.tomsclippylight.uitests
        TEST_TARGET_NAME: TomsClippyLight
        GENERATE_INFOPLIST_FILE: "YES"

schemes:
  TomsClippyLight:
    build:
      targets:
        TomsClippyLight: all
        TomsClippyLightTests: [test]
        TomsClippyLightUITests: [test]
    test:
      targets:
        - TomsClippyLightTests
        - TomsClippyLightUITests
      gatherCoverageData: true
    run:
      config: Debug
    archive:
      config: Release
